<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Backup</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Bookmark Backup</p>
          <h1>书签搜索与备份</h1>
          <p class="hero-text">搜索、同步、恢复都放在这里，先搜再操作。</p>
        </div>
        <div class="hero-orb" aria-hidden="true"></div>
      </section>

      <section class="panel panel-search">
        <div class="section-head">
          <p class="section-kicker">Quick Search</p>
          <h2>搜索书签</h2>
        </div>
        <label class="search-box" for="search-input">
          <span class="search-icon" aria-hidden="true">/</span>
          <input id="search-input" type="search" placeholder="搜索标题、文件夹、网址">
        </label>
        <div id="search-results" class="search-results"></div>
      </section>

      <section class="panel panel-status">
        <div class="status-grid">
          <article class="stat">
            <span class="stat-label">当前状态</span>
            <strong id="status" class="stat-value">加载中...</strong>
            <p id="subtext" class="stat-note"></p>
          </article>
          <article class="stat">
            <span class="stat-label">上次同步</span>
            <strong id="last-sync" class="stat-value">-</strong>
            <p id="gist-id" class="stat-note"></p>
          </article>
        </div>
      </section>

      <section class="panel panel-conflict" id="conflict-card" hidden>
        <div class="section-head">
          <p class="section-kicker">Conflict</p>
          <h2>冲突提醒</h2>
        </div>
        <p id="conflict-text" class="conflict-value">检测到本地 / 远端分叉</p>
        <p class="panel-copy">打开设置页可以选择以本地覆盖远端，或接受远端作为最新基线。</p>
      </section>

      <section class="panel panel-remote" id="remote-card">
        <div class="section-head">
          <p class="section-kicker">Remote Snapshot</p>
          <h2>远端快照</h2>
        </div>
        <p id="remote-version" class="remote-version">未读取</p>
        <p id="remote-summary" class="panel-copy">可先读取远端最新快照，再决定是否恢复到本地书签。</p>
      </section>

      <section class="action-bar">
        <button id="load-remote-btn" class="ghost">读取远端</button>
        <button id="restore-btn" class="ghost">恢复到本地</button>
        <button id="sync-btn" class="primary">立即备份</button>
        <button id="options-btn" class="ghost">打开设置</button>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
