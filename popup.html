<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Backup</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <h1>书签搜索与备份</h1>
          <p class="hero-text">搜索、同步、恢复都放在这里，先搜再操作。</p>
        </div>
        <div class="hero-orb" aria-hidden="true"></div>
      </section>

      <section class="panel panel-search">
        <div class="section-head search-head">
          <div class="search-head-copy">
            <h2>搜索书签</h2>
            <p class="search-head-note">支持空格 / AND 进行组合搜索</p>
          </div>
          <p id="search-summary" class="search-summary">文件夹 0 · 书签 0</p>
        </div>
        <label class="search-box" for="search-input">
          <span class="search-icon" aria-hidden="true">/</span>
          <input id="search-input" type="search" placeholder="搜索标题、文件夹、网址">
        </label>
        <div id="search-results" class="search-results"></div>
      </section>

      <section class="panel panel-status">
        <div class="section-head">
          <h2>上次同步</h2>
        </div>
        <div class="status-grid status-grid-single">
          <article class="stat stat-sync-only">
            <strong id="last-sync" class="stat-value">-</strong>
            <p id="sync-detail" class="stat-note">尚未同步</p>
          </article>
        </div>
      </section>

      <section class="panel panel-conflict" id="conflict-card" hidden>
        <div class="section-head">
          <h2>冲突提醒</h2>
        </div>
        <p id="conflict-text" class="conflict-value">检测到本地 / 远端分叉</p>
        <p class="panel-copy">打开设置页可以选择以本地覆盖远端，或接受远端作为最新基线。</p>
      </section>

      <section class="action-bar">
        <button id="load-remote-btn" class="ghost">读取远端</button>
        <button id="restore-btn" class="primary">恢复到本地</button>
        <button id="sync-btn" class="primary">立即备份</button>
        <button id="options-btn" class="ghost">打开设置</button>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
